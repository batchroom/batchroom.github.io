<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Batch Room — Memory Wall</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<canvas id="dust"></canvas>

<div class="page-wrapper batch-page">

    <!-- HEADER -->

    <header class="batch-header">

        <a href="index.html" class="back-link">← Back</a>

        <h1 id="batchTitle">Batch</h1>

        <p class="batch-subtitle">
            Share the moments that stayed with you.
        </p>

        <button id="shareBtn" class="btn btn-secondary">
            Invite Batchmates
        </button>

    </header>


    <!-- COMPOSE -->

    <section class="compose-card">

        <h2>Leave a Memory</h2>

        <p class="section-subtitle">
            Write as if you're leaving a note in an autograph book.
        </p>

        <textarea
                id="messageInput"
                placeholder="Write something your classmates will smile remembering."
        ></textarea>

        <label class="anon-toggle">

            <input type="checkbox" id="anonymousToggle">

            <span>Post anonymously</span>

        </label>

        <button id="postBtn" class="btn btn-primary">
            Save Memory
        </button>

    </section>


    <!-- MEMORY TIMELINE -->

    <section class="memories-section">

        <ul id="messageList" class="message-list"></ul>

        <div id="messagesEmpty" class="empty-state visually-hidden">

            <p>
                No memories yet.<br>
                Be the first to leave something your batch will smile remembering.
            </p>

        </div>

    </section>


    <!-- PROFILE -->

    <section class="profile-card">

        <h2>Where Are You Now?</h2>

        <p class="section-subtitle">
            Let your batchmates know what you're up to.
        </p>

        <input
                id="currentCity"
                placeholder="City"
        />

        <input
                id="currentWork"
                placeholder="What you're doing now"
        />

        <button id="saveProfileBtn" class="btn btn-secondary">
            Update Profile
        </button>

        <ul id="peopleList"></ul>

    </section>

</div>

<div id="toastContainer" class="toast-container"></div>

<script type="module" src="./batch.js"></script>
<script src="dust.js"></script>

</body>
</html>
