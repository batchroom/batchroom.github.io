<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Batch Room</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>

<body>

<canvas id="dust"></canvas>

<div class="page-wrapper">

    <section class="hero">

        <h1 class="hero-title">Batch Room</h1>

        <p class="hero-subtitle">
            A place where your college memories live on.
        </p>

        <button id="loginBtn" class="btn btn-primary">
            Continue with Google
        </button>

        <button id="logoutBtn" class="btn btn-secondary" style="display:none;">
            Sign Out
        </button>

    </section>

    <section id="loginSection" class="login-message">
        <p>Sign in to start or open your memory walls.</p>
    </section>

    <section id="appSection" style="display:none">

        <section class="section-card">

            <h2 class="section-title">Create Your Batch Memory Wall</h2>

            <p class="section-subtitle">
                Enter your institution and graduation year
            </p>

            <div class="form-grid">

                <div class="form-group">
                    <label class="form-label">Institution</label>

                    <input id="institutionInput" placeholder="Start typing your institution"/>

                    <ul id="institutionSuggestions" class="suggestion-list"></ul>
                </div>

                <div class="form-group">
                    <label class="form-label">Graduation Year</label>

                    <select id="yearSelect">
                        <option value="">Select year</option>
                    </select>
                </div>

            </div>

            <div id="batchNamePreview" class="batch-name-preview" style="display:none">
                <p class="preview-label">Your wall will be called</p>
                <p id="previewName" class="preview-name"></p>
            </div>

            <button id="createBatchBtn" class="btn btn-primary btn-full" disabled>
                Create Memory Wall →
            </button>

        </section>

        <section class="batches-section">

            <div class="section-header">
                <h2>Your Memory Walls</h2>
                <p>Moments frozen in time</p>
            </div>

            <ul id="batchList" class="batch-grid"></ul>

        </section>

    </section>

</div>

<script type="module" src="./app.js"></script>
<script src="dust.js"></script>

</body>
</html>
